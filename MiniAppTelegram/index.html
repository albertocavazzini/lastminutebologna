<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!-- Risolve asset (JS/CSS) su GitHub Pages / WebView Telegram anche senza slash finale nell’URL -->
    <base href="%BASE_URL%" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>LastMinuteBologna</title>
    <meta name="description" content="Offerte last minute a Bologna" />
    <meta name="author" content="LastMinuteBologna" />

    <meta property="og:title" content="LastMinuteBologna" />
    <meta property="og:description" content="Offerte last minute a Bologna" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-HYQ5QKWRP7"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-HYQ5QKWRP7", { send_page_view: false });

      const tg = window.Telegram?.WebApp;
      const user = tg?.initDataUnsafe?.user;
      const isDebugHost =
        location.hostname === "localhost" || location.hostname === "127.0.0.1";

      if (user?.id) {
        gtag("config", "G-HYQ5QKWRP7", {
          user_id: String(user.id),
          user_properties: {
            tg_platform: tg?.platform || "unknown",
          },
          debug_mode: isDebugHost,
        });
      }

      gtag("event", "miniapp_launch", {
        tg_version: tg?.version || "unknown",
        tg_platform: tg?.platform || "unknown",
        debug_mode: isDebugHost,
      });
    </script>
  </head>

  <body>
    <div id="root">
      <!-- Sostituito da React; se resta visibile, JS non è partito (URL/base errati o Pages non su Actions). -->
      <div
        id="boot-shell"
        style="
          box-sizing: border-box;
          min-height: 100dvh;
          margin: 0;
          padding: max(1.25rem, env(safe-area-inset-top, 0px)) 1.25rem 1.25rem;
          font-family: system-ui, sans-serif;
          background: hsl(0 0% 97%);
          color: hsl(0 0% 28%);
        "
      >
        <p style="margin: 0 0 0.5rem; font-size: 1.125rem; font-weight: 700">
          LastMinute<span style="color: hsl(11 100% 69%)">Bologna</span>
        </p>
        <p style="margin: 0; font-size: 0.875rem; opacity: 0.75">
          Caricamento…
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <p style="font-family: system-ui; padding: 1rem">
        Attiva JavaScript per usare la mini app.
      </p>
    </noscript>
  </body>
</html>
