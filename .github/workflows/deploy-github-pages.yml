# Build della mini app e pubblicazione sul branch gh-pages (solo file di dist).
# Così in Settings → Pages puoi usare "Deploy from a branch" → gh-pages / (root)
# senza vedere il README del branch main.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: MiniAppTelegram/package-lock.json

      - name: Install & build mini app
        working-directory: MiniAppTelegram
        env:
          VITE_SKIP_LOVABLE_TAGGER: "1"
          # Repository → Settings → Secrets and variables → Actions
          VITE_APPS_SCRIPT_WEBAPP_BASE: ${{ secrets.VITE_APPS_SCRIPT_WEBAPP_BASE }}
          VITE_PUBLIC_MINI_APP_URL: ${{ secrets.VITE_PUBLIC_MINI_APP_URL }}
        run: |
          npm ci
          npm run build

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: MiniAppTelegram/dist
          force_orphan: true
